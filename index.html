<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Kairo — Learn software by doing</title>
    <meta name="description" content="Kairo is a screen-native AI tutor that guides you through complex software one verified step at a time." />
    <style>
      /* Kairo's transparent surfaces (cursor/overlay/notch) live on transparent
         windows. Force their background transparent from the very first paint —
         before the bundle CSS (which defaults body to a light colour) loads —
         otherwise the full-screen cursor webview flashes light while it loads. */
      html.kairo-transparent,
      html.kairo-transparent body {
        background: transparent !important;
      }
    </style>
    <script>
      (function () {
        var hash = window.location.hash || '';
        if (/^#\/(cursor|overlay|notch)/.test(hash)) {
          document.documentElement.classList.add('kairo-transparent');
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
